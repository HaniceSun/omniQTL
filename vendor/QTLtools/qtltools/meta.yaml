{% set name = "qtltools" %}
{% set version = "1.3.1" %}

package:
  name: {{ name }}
  version: {{ version }} 

source:
  url: https://qtltools.github.io/qtltools/binaries/QTLtools_{{ version }}_source.tar.gz

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - pkg-config
    - make
    - automake
    - autoconf
    - libtool
  host:
    - zlib
    - bzip2
    - gsl
    - xz
    - libcurl
    - openssl
    - boost-cpp
    - htslib
    - r-base=4.5.2
  run:
    - zlib
    - bzip2
    - gsl
    - xz
    - libcurl
    - openssl
    - boost-cpp
    - htslib
    - r-base=4.5.2

